<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Process Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Smart Process Optimizer</h1>

    <div class="container">
        <h2>Ingresar Proceso</h2>

        <label>Nombre del proceso:</label>
        <input type="text" id="nombre">

        <label>Número de pasos:</label>
        <input type="number" id="pasos">

        <label>Tiempo total (minutos):</label>
        <input type="number" id="tiempo">

        <button onclick="analizar()">Analizar Proceso</button>

        <h3>Resultado:</h3>
        <p id="resultado"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
